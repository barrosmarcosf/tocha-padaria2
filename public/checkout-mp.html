<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Premium | Tocha Padaria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        :root {
            --bg-deep: #0B0B0B;
            --bg-card: #141414;
            --bg-input: #1E2229;
            --accent: #EBB43B;
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.5);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .checkout-wrapper {
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
            display: flex;
            align-items: flex-start;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 38% 62%;
            width: 100%;
            gap: 60px;
        }

        /* --- Coluna Esquerda: Resumo --- */
        .summary-col {
            padding-top: 20px;
        }

        .back-link {
            display: inline-block;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 30px;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 0.8;
        }

        .col-title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .order-id {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 40px;
            word-break: break-all;
        }

        .item-list {
            margin-bottom: 30px;
        }

        .product-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .product-info .name {
            display: block;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .product-info .qty {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
        }

        .product-price {
            font-size: 15px;
            font-weight: 500;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 30px 0;
            position: relative;
        }

        .divider-accent {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
            opacity: 0.8;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 40px;
        }

        .batch-box {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--accent);
            padding: 16px 20px;
            font-size: 14px;
            color: var(--text-main);
            letter-spacing: 0.2px;
        }

        /* --- Coluna Direita: Pagamento --- */
        .payment-col {
            background: #181818;
            border-radius: 20px;
            padding: 44px 48px 48px;
            position: relative;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.06),
                0 24px 60px rgba(0,0,0,0.5);
        }

        .payment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .payment-header .col-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 0;
        }

        .mp-logo-right {
            height: 38px;
        }

        /* Container escuro ao redor do Brick */
        .bricks-wrapper {
            background: #0B0B0B;
            border-radius: 16px;
            padding: 6px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.07),
                0 12px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        #mp-card-bricks {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
        }

        .trust-footer {
            margin-top: 40px;
            padding-top: 28px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.7;
        }

        .trust-footer .trust-secure {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .trust-footer .trust-secure svg {
            flex-shrink: 0;
            color: #4ade80;
        }

        .trust-footer a {
            color: #60a5fa;
            text-decoration: underline;
            font-size: 12px;
        }

        /* Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsividade */
        @media (max-width: 900px) {
            .checkout-wrapper {
                padding: 20px 0;
            }
            .checkout-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            .summary-col {
                padding: 0 20px;
            }
            .payment-col {
                padding: 40px 20px;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="checkout-wrapper">
        <!-- Painel de Erro Crítico -->
        <div id="error-panel" style="display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); width:90%; max-width:600px; background:#ff4444; color:white; padding:25px; border-radius:15px; z-index:9999; box-shadow:0 10px 30px rgba(0,0,0,0.5); font-weight:500;">
            <h2 style="margin-bottom:10px;">❌ Erro na Inicialização</h2>
            <p id="error-msg" style="font-family:monospace; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px;"></p>
            <button onclick="window.location.href='/'" style="margin-top:20px; background:white; color:#ff4444; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">Voltar para a Loja</button>
        </div>

        <div class="checkout-grid">
            <!-- Coluna Esquerda: Resumo -->
            <aside class="summary-col">
                <a href="/" class="back-link">← Voltar para a loja</a>
                <h1 class="col-title">Seu pedido</h1>
                <span class="order-id" id="order-id-label">Carregando...</span>
                
                <div id="item-list-container" class="item-list">
                    <!-- Itens via JS -->
                </div>
                
                <div class="divider">
                    <div class="divider-accent"></div>
                </div>
                
                <div class="total-row">
                    <span>Total</span>
                    <span id="total-amount">R$ 0,00</span>
                </div>
                
                <div class="batch-box" id="batch-info-container">
                    <span id="batch-date-label">Fornada: Carregando...</span>
                </div>
            </aside>

            <!-- Coluna Direita: Pagamento -->
            <main class="payment-col">
                <div class="payment-header">
                    <h2 class="col-title">DADOS DO CARTÃO</h2>
                    <div style="background:#FFE600; border-radius:10px; padding:7px 14px; display:inline-flex; align-items:center;">
                        <img src="/mp-logo.svg" alt="Mercado Pago" class="mp-logo-right">
                    </div>
                </div>
                
                <div class="bricks-wrapper">
                    <div id="mp-card-bricks"></div>
                </div>
                
                <footer class="trust-footer">
                    <div class="trust-secure">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        Sua compra é 100% segura.
                    </div>
                    <p>Todos os dados são criptografados e a transação é auditada pelo Mercado Pago.</p>
                    <a href="https://www.mercadopago.com.br/seguranca" target="_blank" rel="noopener">Saiba mais sobre a segurança do Mercado Pago ↗</a>
                </footer>
            </main>
        </div>
    </div>

    <script>
        let cardPaymentBrickController;
        let orderData = null;

        async function init() {
            console.log("🚀 CHECKOUT VERSION 3");
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('order_id');
            console.log('🌐 [URL Check] order_id recebido:', orderId);
            console.log("INIT MP");

            if (!orderId) {
                console.error('❌ order_id está ausente na URL');
                showError('Erro: O ID do pedido não foi enviado para a página de pagamento.');
                return;
            }

            try {
                console.log('🔍 [Checkout] Iniciando para pedido:', orderId);
                // 1. Buscar dados do pedido
                const res = await fetch(`/api/mercadopago/order-summary/${orderId}`);
                if (!res.ok) {
                    const errTxt = await res.text();
                    console.error('❌ Erro no sumário:', errTxt);
                    throw new Error('Não foi possível carregar os dados do pedido: ' + errTxt);
                }
                
                orderData = await res.json();
                console.log('📦 [Checkout] Dados do pedido carregados:', orderData);
                renderSummary(orderData);

                // 2. Buscar chave pública
                const pkRes = await fetch('/api/mercadopago/public-key');
                if (!pkRes.ok) throw new Error('Erro ao buscar chave pública do Mercado Pago.');
                const pkData = await pkRes.json();
                console.log('🔑 [Checkout] Chave pública carregada.');

                if (!pkData.publicKey) throw new Error('Chave pública não configurada no servidor.');

                // 3. Inicializar Bricks
                console.log("🔑 [MP] Inicializando com chave:", pkData.publicKey);
                const mp = new MercadoPago(pkData.publicKey, { locale: 'pt-BR' });
                const bricks = mp.bricks();

                const payerEmail = orderData.customer && orderData.customer.email
                    ? String(orderData.customer.email).trim()
                    : null;

                cardPaymentBrickController = await bricks.create("cardPayment", "mp-card-bricks", {
                    initialization: {
                        amount: orderData.total,
                        ...(payerEmail ? { payer: { email: payerEmail } } : {})
                    },
                    customization: {
                        visual: {
                            style: {
                                theme: "default" // Alterado para default conforme sugestão para garantir carga
                            }
                        }
                    },
                    callbacks: {
                        onReady: () => {
                            console.log("✅ Bricks pronto");
                            const loader = document.getElementById('loader');
                            if (loader) loader.style.opacity = '0';
                            setTimeout(() => { if(loader) loader.remove(); }, 500);
                        },
                        onSubmit: async (cardFormData) => {
                            console.log("📤 [MP] onSubmit disparado");
                            console.log('TOKEN MP FRONT:', cardFormData.token);
                            try {
                                if (!cardFormData.token) throw new Error('TOKEN NÃO GERADO');

                                const res = await fetch('/api/mercadopago/create-card-payment', {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json'
                                    },
                                    body: JSON.stringify({
                                        token: cardFormData.token,
                                        payment_method_id: cardFormData.payment_method_id,
                                        issuer_id: cardFormData.issuer_id,
                                        installments: Number(cardFormData.installments || 1),
                                        payer: {
                                            email: cardFormData.payer?.email || 'test@test.com'
                                        },
                                        amount: Number(orderData.total),
                                        order_id: orderData.id
                                    })
                                });

                                const data = await res.json();

                                if (!res.ok) {
                                    throw new Error(data.error || 'Erro no pagamento');
                                }

                                console.log("✅ Pagamento OK", data);
                                window.location.href = `/?status=success&order_id=${data.order_id || orderData.id}`;

                            } catch (err) {
                                console.error("❌ Erro no processamento:", err);
                                alert(err.message);
                            }
                        },
                        onError: (error) => {
                            console.error("❌ Erro no Brick:", error);
                            showError("Erro ao carregar pagamento. Tente novamente.");
                        }
                    }
                });

            } catch (e) {
                console.error('💥 [Checkout Error]:', e);
                const errPanel = document.getElementById('error-panel');
                const errMsg = document.getElementById('error-msg');
                const loaderEl = document.getElementById('loader');
                if (loaderEl) loaderEl.style.display = 'none';

                if (errPanel && errMsg) {
                    errMsg.innerText = e.message;
                    errPanel.style.display = 'block';
                } else {
                    alert('Erro Crítico: ' + e.message);
                }
            }
        }

        function showError(msg) {
            const errPanel = document.getElementById('error-panel');
            const errMsg = document.getElementById('error-msg');
            if (errPanel && errMsg) {
                errMsg.innerText = msg;
                errPanel.style.display = 'block';
                const loader = document.getElementById('loader');
                if (loader) loader.style.display = 'none';
            } else {
                alert(msg);
            }
        }

        function renderSummary(data) {
            document.getElementById('order-id-label').innerText = `#${data.id}`;
            document.getElementById('total-amount').innerText = `R$ ${data.total.toFixed(2).replace('.', ',')}`;
            
            // Formatar data da fornada
            let batchLabel = 'A confirmar';
            if (data.batch_date) {
                const raw = data.batch_date;
                const dateObj = raw.match(/^\d{4}-\d{2}-\d{2}$/)
                    ? new Date(raw + 'T12:00:00')
                    : null;
                if (dateObj) {
                    const days = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
                    const d = String(dateObj.getDate()).padStart(2,'0');
                    const m = String(dateObj.getMonth()+1).padStart(2,'0');
                    const y = dateObj.getFullYear();
                    batchLabel = `${days[dateObj.getDay()]} ${d}/${m}/${y}`;
                } else {
                    // já é string formatada — remove "dia " se presente
                    batchLabel = String(raw).replace(/\bdia\s+/gi, '').replace(/,\s*/g, ' ').trim();
                }
            }
            document.getElementById('batch-date-label').innerText = `Fornada: ${batchLabel}`;

            const container = document.getElementById('item-list-container');
            container.innerHTML = '';

            data.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'product-row';
                div.innerHTML = `
                    <div class="product-info">
                        <span class="name">${item.name}</span>
                        <span class="qty">${item.qty}x</span>
                    </div>
                    <span class="product-price">R$ ${(item.price * item.qty).toFixed(2).replace('.', ',')}</span>
                `;
                container.appendChild(div);
            });
        }

        init();
    </script>
</body>
</html>
