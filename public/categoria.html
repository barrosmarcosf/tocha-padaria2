<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Categoria - Tocha Padaria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Lato:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/modules/css/base.css">
  <link rel="stylesheet" href="/modules/css/cart.css">
  <link rel="stylesheet" href="/modules/css/categoria.css">
</head>

<body style="background:#000;">

<main class="categoria-page">
  <div class="container">
    <!-- BOTÃO VOLTAR -->
    <button class="back-btn" onclick="window.location.href='/index.html#menu'">
      ← Voltar para o Cardápio
    </button>

    <!-- HEADER -->
    <section class="categoria-header">
      <h1 id="categoriaTitulo">Carregando...</h1>
      <p id="categoriaSubtitulo"></p>
    </section>

    <!-- PRODUTOS -->
    <section id="produtosGrid" class="produtos-grid"></section>
  </div>

  <!-- CARRINHO FLUTUANTE (Oficial) -->
  <button id="floating-cart" class="floating-cart-btn" aria-label="Ver Carrinho" onclick="window.openCart()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="20" r="1"></circle>
      <circle cx="18" cy="20" r="1"></circle>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
    </svg>
    <span id="floating-cart-badge" class="cart-badge">0</span>
  </button>
</main>

<!-- O cart.js injeta automaticamente o carrinho flutuante e o painel modal -->
<script src="/cart.js"></script>
<script src="categoria.js"></script>

</body>
</html>
