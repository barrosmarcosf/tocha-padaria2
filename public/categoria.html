<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Categoria - Tocha Padaria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Lato:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/modules/css/base.css">
  <link rel="stylesheet" href="/modules/css/cart.css">
  <link rel="stylesheet" href="/modules/css/categoria.css">
</head>

<body style="background:#000;">

<main class="categoria-page">
  <div class="container">
    <!-- BOTÃO VOLTAR -->
    <button class="back-btn" onclick="window.location.href='/index.html#menu'">
      ← Voltar para o Cardápio
    </button>

    <!-- HEADER -->
    <section class="categoria-header">
      <div id="headerLoading" class="skeleton skeleton-title"></div>
      <h1 id="categoriaTitulo" style="display: none;"></h1>
      <p id="categoriaSubtitulo"></p>
    </section>

    <!-- PRODUTOS -->
    <section id="produtosGrid" class="produtos-grid">
      <!-- Skeletons iniciais (5 cards para mimetizar o grid desktop) -->
      <div class="produto-card skeleton"></div>
      <div class="produto-card skeleton"></div>
      <div class="produto-card skeleton"></div>
      <div class="produto-card skeleton"></div>
      <div class="produto-card skeleton"></div>
    </section>
  </div>
</main>

<!-- O cart.js injeta automaticamente o carrinho flutuante e o painel modal -->
<script src="/cart.js"></script>
<script src="categoria.js"></script>

</body>
</html>
