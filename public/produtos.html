<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Tocha Padaria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reset-layout-1404.css?v=1500">
    <style>
        .products-gallery-page {
            background: #0a0a0a;
            min-height: 100vh;
            padding-top: 120px;
            padding-bottom: 80px;
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .gallery-header {
            margin-bottom: 60px;
            text-align: center;
        }

        .gallery-header h1 {
            font-size: 4rem;
            color: var(--white);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .thumbnail-item {
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            background: #151515;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .thumbnail-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .thumbnail-item:hover {
            transform: translateY(-8px);
        }

        .thumbnail-item:hover img {
            transform: scale(1.08);
        }

        .btn-back-home {
            position: fixed;
            top: 100px;
            left: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--white);
            padding: 10px 20px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            z-index: 10001;
            transition: all 0.3s ease;
        }

        .btn-back-home:hover {
            background: var(--white);
            color: #000;
        }

        @media (max-width: 768px) {
            .gallery-container {
                padding: 0 20px;
            }
            .gallery-header h1 {
                font-size: 2.5rem;
            }
            .btn-back-home {
                top: 80px;
                left: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="texture-overlay"></div>

    <nav class="sticky-nav">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <img id="site-logo-nav" src="assets/logo.png" alt="Tocha Padaria Logo">
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-text-item">VOLTAR AO INÍCIO</a></li>
            </ul>
        </div>
    </nav>

    <main class="products-gallery-page">
        <div class="gallery-container">
            <div class="gallery-header">
                <h1 id="gallery-title">Nossos Produtos</h1>
            </div>
            
            <div id="thumbnail-grid" class="thumbnail-grid">
                <!-- Populado dinamicamente -->
            </div>
        </div>
    </main>

    <script src="app.js?v=restore-1404"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Pequeno delay para garantir que o app.js carregou os dados
            setTimeout(() => {
                renderOnlyThumbnails();
            }, 500);

            async function renderOnlyThumbnails() {
                const grid = document.getElementById('thumbnail-grid');
                if (!grid) return;

                // Pegamos os produtos do estado global do app.js
                const state = window.stateData; 
                // Se stateData não estiver disponível, esperamos o fetch
                const urlParams = new URLSearchParams(window.location.search);
                const catSlug = urlParams.get('cat');

                const resp = await fetch('/api/config');
                const { categorias, produtos } = await resp.json();
                
                let filteredItems = produtos || [];
                if (catSlug) {
                    filteredItems = filteredItems.filter(p => p.category_slug === catSlug);
                    const cat = categorias.find(c => c.slug === catSlug);
                    if (cat) document.getElementById('gallery-title').textContent = cat.title;
                }

                grid.innerHTML = '';
                filteredItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'thumbnail-item';
                    div.innerHTML = `<img src="${item.image_url}" alt="${item.name}" loading="lazy">`;
                    
                    // Opcional: Clique para ver detalhes (Lightbox ou redirect de volta com modal)
                    div.addEventListener('click', () => {
                        // Por enquanto apenas log, mas podemos abrir um modal de compra
                        console.log("Selecionado:", item.name);
                    });
                    
                    grid.appendChild(div);
                });
            }
        });
    </script>
</body>

</html>
