<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tocha Padaria — Fermentação Natural &amp; Pães Artesanais</title>
<meta name="description" content="Pães de fermentação natural, brioches e doces artesanais. Fornadas aos sábados em São João de Meriti.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans: 'DM Sans', system-ui, sans-serif;
  }
  html { scroll-behavior: smooth; }
  body {
    background: oklch(12% 0.018 50);
    color: oklch(92% 0.012 70);
    font-family: 'DM Sans', system-ui, sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: oklch(12% 0.018 50); }
  ::-webkit-scrollbar-thumb { background: oklch(72% 0.12 60); border-radius: 2px; }
  ::selection { background: oklch(72% 0.12 60); color: oklch(12% 0.018 50); }
  #root { min-height: 100vh; }
  input::placeholder { color: oklch(40% 0.01 60); }
  input:focus { outline: none; }
  a { transition: color 0.2s; }
  select { appearance: none; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes slideIn {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0);   opacity: 1; }
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-33.333%); }
  }
  @keyframes scrollLine {
    0%,100% { opacity: 0.3; transform: scaleY(0.6); }
    50%     { opacity: 1;   transform: scaleY(1); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes popIn {
    0%  { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.1); }
    100%{ transform: scale(1);   opacity: 1; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
<script src="./app.js"></script>
</body>
</html>
