    <div class="fale-container">
        <h1 class="fale-title">FALE CONOSCO</h1>
        <p class="fale-sub">Tem dúvidas, críticas ou sugestões?<br>Pergunte que a gente responde!</p>
        
        <form class="fale-form">
            <input type="text" class="fale-input" placeholder="Nome completo" required>
            <input type="email" class="fale-input" placeholder="Digite seu e-mail" required>
            
            <div class="input-wrapper">
                <input type="tel" class="fale-input" placeholder="Telefone" required>
                <!-- Cadeado icone (vermelho pequeno) -->

                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            
            <textarea class="fale-input fale-textarea" placeholder="Mensagem" required></textarea>
            
            <div class="fale-btn-wrapper">
                <button type="submit" class="fale-submit">ENVIAR MENSAGEM</button>
            </div>
        </form>
    </div>

    <!-- Círculo WhatsApp flutuante no canto inferior esquerdo -->

    <!-- Notification Overlay & Modal -->
    <div id="notification-overlay" class="cart-overlay"></div>
    <div id="notification-modal" class="id-modal" role="dialog" aria-modal="true" style="text-align: center;">
        <div class="id-modal-body" style="padding: 3.5rem 2rem 2.5rem;">
            <div id="notification-icon" style="margin-bottom: 1.5rem;"></div>
            <h2 id="notification-title" style="font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 1rem;"></h2>
            <p id="notification-message" style="color: var(--text-dim); margin-bottom: 2rem; line-height: 1.6;"></p>
            <button id="notification-close-btn" class="btn-checkout" style="width: 100%;">Continuar</button>
        </div>
    </div>

    <!-- Script form submit -->
    <script>
        document.querySelector('.fale-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = this.querySelector('.fale-submit');
            const originalText = submitBtn.textContent;
            
            // Capturar dados
            const formData = {
                name: this.querySelector('input[placeholder="Nome completo"]').value,
                email: this.querySelector('input[placeholder="Digite seu e-mail"]').value,
                phone: this.querySelector('input[placeholder="Telefone"]').value,
                message: this.querySelector('textarea').value
            };

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'ENVIANDO...';

                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) throw new Error('Falha no envio');

                // Mostrar Modal de Sucesso (mantendo sua lógica original)
                const overlay = document.getElementById('notification-overlay');
                const modal = document.getElementById('notification-modal');
                const iconContainer = document.getElementById('notification-icon');
                
                iconContainer.innerHTML = '<svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
                
                document.getElementById('notification-title').textContent = 'Mensagem Enviada!';
                document.getElementById('notification-message').textContent = 'Sua mensagem foi entregue com sucesso. Obrigado pelo contato!';
                
                overlay.classList.add('visible');
                modal.classList.add('open');
                
                const closeFn = () => {
                    overlay.classList.remove('visible');
                    modal.classList.remove('open');
                    this.reset();
                };
                
                document.getElementById('notification-close-btn').onclick = closeFn;
                overlay.onclick = closeFn;

            } catch (err) {
                console.error(err);
                alert('Desculpe, ocorreu um erro ao enviar sua mensagem. Tente novamente em alguns instantes.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>
