<!DOCTYPE html>
<html lang="pt-br" style="background:#0a0a0a">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Lato:wght@400;700;900&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- CSS Modulares Independentes -->
    <link rel="stylesheet" href="/modules/css/base.css">
    <link rel="stylesheet" href="/modules/css/nav.css">
    <link rel="stylesheet" href="/modules/css/footer.css">
    <link rel="stylesheet" href="/modules/css/cart.css">
    <link rel="stylesheet" href="/modules/css/fale-conosco.css">
</head>
<body class="l-fale-conosco">
    <div id="page-cover" style="position:fixed;inset:0;background:#0a0a0a;z-index:999999;pointer-events:none"></div>
    <div id="top-status-bar" class="store-status-bar">
        <span id="status-text-top">VERIFICANDO PEDIDOS...</span>
    </div>

    <nav class="sticky-nav">
        <div class="nav-content">
            <a href="/#hero" class="nav-logo" aria-label="Tocha Padaria – Ir para início">
                <img src="/assets/logo.png" alt="Tocha Padaria Logo">
            </a>

            <div class="nav-center-group">
                <div class="nav-search-item">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="site-search-f" class="site-search" placeholder="Buscar">
                    </div>
                </div>
                <ul class="nav-links">
                    <li><a href="/#hero" class="nav-text-item">INICIAL</a></li>
                    <li><a href="/#menu" class="nav-text-item">CARDÁPIO</a></li>
                    <li><a href="/nossa-historia.html" class="nav-text-item">NOSSA HISTÓRIA</a></li>
                    <li><a href="/fale-conosco.html" class="nav-text-item">FALE CONOSCO</a></li>
                </ul>
            </div>

            <div class="nav-right">
                <div class="nav-socials">
                    <a href="https://instagram.com/tocha.padaria" target="_blank" rel="noopener" class="nav-icon-link" aria-label="Instagram">
                        <svg class="nav-social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                            <circle cx="12" cy="12" r="11.4"/>
                            <rect x="7" y="7" width="10" height="10" rx="3" ry="3"/>
                            <circle cx="12" cy="12" r="2.2" />
                            <circle cx="15.5" cy="8.5" r="0.8" fill="currentColor" stroke="none"/>
                        </svg>
                    </a>
                </div>
                <div class="nav-cart-item">
                    <button id="cart-toggle" class="cart-toggle-btn" aria-label="Abrir carrinho">
                        <svg class="cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="20" r="1.5"></circle>
                            <circle cx="18" cy="20" r="1.5"></circle>
                            <path d="M1 1h3.5l2.68 12.39a2 2 0 0 0 2 1.61h8.72a2 2 0 0 0 2-1.61L22 5H5.5"></path>
                        </svg>
                        <span id="cart-badge" class="cart-badge" hidden>0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="fale-main">
        <div class="fale-container">

            <h1 class="fale-title">FALE CONOSCO</h1>
            <p class="fale-sub">Tem dúvidas, críticas ou sugestões?<br>Pergunte que a gente responde!</p>

            <form class="fale-form" novalidate>
                <div class="field-group">
                    <label class="field-label">Nome completo <span class="obrigatorio">*</span></label>
                    <input type="text" class="fale-input" placeholder="Seu nome" required autocomplete="name">
                </div>

                <div class="field-group">
                    <label class="field-label">E-mail <span class="obrigatorio">*</span></label>
                    <input type="email" class="fale-input" placeholder="seu@email.com" required autocomplete="email">
                </div>

                <div class="field-group">
                    <label class="field-label">Telefone <span class="obrigatorio">*</span></label>
                    <div class="input-wrapper">
                        <input type="tel" class="fale-input" placeholder="(21) 99999-9999" required autocomplete="tel">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label">Mensagem <span class="obrigatorio">*</span></label>
                    <textarea class="fale-input fale-textarea" placeholder="Como podemos ajudar?" required></textarea>
                </div>

                <div class="container-botao">
                    <button type="submit" class="botao-contato">ENVIAR MENSAGEM</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Círculo WhatsApp flutuante no canto inferior esquerdo -->
    <a class="whatsapp-float" href="https://wa.me/5521966278965" target="_blank" rel="noopener" aria-label="Fale conosco no WhatsApp">
        <img src="/assets/whatsapp-icon.svg" alt="WhatsApp" style="width: 38px; height: 38px; display: block;" />
    </a>

    <!-- Notification Overlay & Modal -->
    <div id="notification-overlay" class="cart-overlay"></div>
    <div id="notification-modal" class="id-modal" role="dialog" aria-modal="true" style="text-align: center;">
        <div class="id-modal-body" style="padding: 3.5rem 2rem 2.5rem;">
            <div id="notification-icon" style="margin-bottom: 1.5rem;"></div>
            <h2 id="notification-title" style="font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 1rem;"></h2>
            <p id="notification-message" style="color: var(--text-dim); margin-bottom: 2rem; line-height: 1.6;"></p>
            <button id="notification-close-btn" class="btn-checkout" style="width: 100%;">Continuar</button>
        </div>
    </div>

    <script>
        /* ── Validação: marca campo inválido ao sair do foco ── */
        document.querySelectorAll('.fale-input[required]').forEach(input => {
            input.addEventListener('blur', () => {
                if (!input.value.trim() || !input.checkValidity()) {
                    input.classList.add('input-erro');
                } else {
                    input.classList.remove('input-erro');
                }
            });
            input.addEventListener('input', () => {
                if (input.value.trim() && input.checkValidity()) {
                    input.classList.remove('input-erro');
                }
            });
        });

        /* ── Form Submit ── */
        document.querySelector('.fale-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const camposObrigatorios = this.querySelectorAll('.fale-input[required]');
            let valido = true;
            let primeiroErro = null;

            camposObrigatorios.forEach(input => {
                if (!input.value.trim() || !input.checkValidity()) {
                    input.classList.add('input-erro');
                    valido = false;
                    if (!primeiroErro) primeiroErro = input;
                } else {
                    input.classList.remove('input-erro');
                }
            });

            if (!valido) {
                primeiroErro.focus();
                return;
            }

            const submitBtn = this.querySelector('.botao-contato');
            const originalText = submitBtn.textContent;

            const formData = {
                name:    nomeInput.value.trim(),
                email:   emailInput.value.trim(),
                phone:   this.querySelector('input[type="tel"]').value.trim(),
                message: this.querySelector('textarea').value.trim()
            };

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'ENVIANDO...';

                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) throw new Error('Falha no envio');

                const overlay = document.getElementById('notification-overlay');
                const modal   = document.getElementById('notification-modal');

                document.getElementById('notification-icon').innerHTML =
                    '<svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
                document.getElementById('notification-title').textContent   = 'Mensagem Enviada!';
                document.getElementById('notification-message').textContent = 'Sua mensagem foi entregue com sucesso. Obrigado pelo contato!';

                overlay.classList.add('visible');
                modal.classList.add('open');

                const closeFn = () => {
                    overlay.classList.remove('visible');
                    modal.classList.remove('open');
                    this.reset();
                };
                document.getElementById('notification-close-btn').onclick = closeFn;
                overlay.onclick = closeFn;

            } catch (err) {
                console.error(err);
                alert('Desculpe, ocorreu um erro ao enviar sua mensagem. Tente novamente.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

    </script>
    <script src="/app.js" defer></script>
    <script src="/cart.js" defer></script>
</body>
</html>
