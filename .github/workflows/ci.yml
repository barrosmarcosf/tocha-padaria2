name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check server.js + src/ + tests/
        run: |
          node --check server.js
          find src   -name "*.js" -exec node --check {} +
          find tests -name "*.js" -exec node --check {} +

  regression:
    name: Payment regression tests
    runs-on: ubuntu-latest
    needs: syntax
    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps (skip puppeteer download)
        run: npm ci --ignore-scripts
      - name: Run payment regression suite
        run: node tests/payment-regression.js
